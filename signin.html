<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — PocketOregon</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(249, 115, 22, 0.3); /* Orange */
            top: -100px; left: -100px;
        }

        .orb-2 {
            width: 500px; height: 500px;
            background: rgba(124, 58, 237, 0.2); /* Purple */
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: rgba(37, 99, 235, 0.2); /* Blue */
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: move-center 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        @keyframes move-center {
            0% { transform: translate(-50%, -50%) translate(-30px, -30px); }
            100% { transform: translate(-50%, -50%) translate(30px, 30px); }
        }

        /* ── SIGN IN CARD ── */
        .signin-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(249, 115, 22, 0.1);
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            background: linear-gradient(to bottom right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a1a1aa;
            font-size: 0.9375rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            min-height: 44px;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #71717a;
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Custom Google Button Overrides */
        iframe {
            color-scheme: light;
        }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="signin-card">
        <div class="logo-container">
            <svg class="text-orange-500" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 8l3 3 7-4 7 4 3-3-10-6z M12 8l-5 4 5 10 5-10-5-4z"></path>
            </svg>
        </div>
        <h1>Sign in</h1>
        <p>Welcome back to PocketOregon. Sign in to join the community and explore the Pocketverse.</p>
        
        <div class="google-btn-wrapper">
            <div id="google-btn"></div>
        </div>

        <a href="/" class="back-link">← Back to home</a>
    </div>

    <script>
        const WORKER_URL = 'https://po.pocketoregon.workers.dev';
        const GOOGLE_CLIENT_ID = '930005975840-u809k2ldaa6cug4jm82tafb5vahoou4h.apps.googleusercontent.com';

        function handleCredentialResponse(response) {
            fetch(WORKER_URL + '/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                if (data.user && data.sessionToken) {
                    localStorage.setItem('po_user', JSON.stringify(data.user));
                    localStorage.setItem('po_token', data.sessionToken);
                    // Check if there's a return URL
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || '/';
                    window.location.href = redirect;
                } else {
                    console.error('Auth failed:', data.error || 'No session token returned');
                }
            })
            .catch(err => console.error('Auth error:', err));
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("google-btn"),
                { theme: "outline", size: "large", width: 320, shape: "pill", logo_alignment: "center" }
            );
        };
    </script>
</body>
</html>
