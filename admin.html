<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — PocketOregon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #1f1e24; }
        .outfit { font-family: 'Outfit', sans-serif; }
        #gate { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:white; border:1px solid #e5e7eb; border-radius:12px; padding:2.5rem; max-width:400px; width:100%; text-align:center; }
        .stat-card { background:white; border:1px solid #e5e7eb; border-radius:8px; padding:1.5rem; }
        .stat-num { font-size:2rem; font-weight:800; color:#1f1e24; }
        .stat-label { font-size:0.875rem; color:#9ca3af; margin-top:4px; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:0.75rem; font-weight:600; color:#9ca3af; text-transform:uppercase; padding:10px 12px; border-bottom:1px solid #e5e7eb; }
        td { padding:10px 12px; font-size:0.875rem; border-bottom:1px solid #f3f4f6; }
        tr:last-child td { border-bottom:none; }
        .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:0.75rem; font-weight:600; }
        .badge-admin { background:#ede9fe; color:#7c3aed; }
        .badge-reader { background:#f3f4f6; color:#6b7280; }
        .btn { padding:8px 18px; border-radius:6px; font-size:0.875rem; font-weight:600; cursor:pointer; border:none; transition:background 0.15s; }
        .btn-dark { background:#1f1e24; color:white; }
        .btn-dark:hover { background:#374151; }
        .btn-red { background:#fee2e2; color:#dc2626; }
        .btn-red:hover { background:#fecaca; }
    </style>
</head>
<body>

<!-- Gate: shown before auth check -->
<div id="gate">
    <div class="card">
        <svg class="mx-auto mb-4 text-orange-500" width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L2 8l3 3 7-4 7 4 3-3-10-6z M12 8l-5 4 5 10 5-10-5-4z"></path>
        </svg>
        <h1 class="outfit text-2xl font-bold mb-2">Admin Panel</h1>
        <p id="gate-msg" class="text-gray-500 text-sm mb-6">Verifying access...</p>
        <button id="gate-login-btn" class="btn btn-dark w-full" style="display:none;">Sign in with Google</button>
        <a href="/" class="block mt-3 text-sm text-gray-400 hover:text-gray-600">← Back to site</a>
    </div>
</div>

<!-- Admin Dashboard: shown after auth -->
<div id="dashboard" style="display:none;">
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <svg class="text-orange-500" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 8l3 3 7-4 7 4 3-3-10-6z M12 8l-5 4 5 10 5-10-5-4z"></path>
            </svg>
            <span class="outfit font-bold text-lg">PocketOregon Admin</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="admin-name" class="text-sm text-gray-500"></span>
            <a href="/" class="btn btn-dark text-sm">← Site</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card">
                <div id="stat-users" class="stat-num">—</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div id="stat-comments" class="stat-num">—</div>
                <div class="stat-label">Comments</div>
            </div>
            <div class="stat-card">
                <div id="stat-chats" class="stat-num">—</div>
                <div class="stat-label">AI Chats</div>
            </div>
            <div class="stat-card">
                <div id="stat-age" class="stat-num">—</div>
                <div class="stat-label">Site Age (days)</div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white border border-gray-200 rounded-8 rounded-lg mb-8">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 class="outfit font-bold text-lg">Users</h2>
                <button onclick="loadDashboard()" class="btn btn-dark text-xs">↻ Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <tr><td colspan="4" class="text-center text-gray-400 py-6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Recent Comments -->
        <div class="bg-white border border-gray-200 rounded-lg mb-8">
            <div class="px-6 py-4 border-b border-gray-100">
                <h2 class="outfit font-bold text-lg">Recent Comments</h2>
            </div>
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Comment</th>
                            <th>Chapter</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="comments-table-body">
                        <tr><td colspan="4" class="text-center text-gray-400 py-6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Recent Chats -->
        <div class="bg-white border border-gray-200 rounded-lg">
            <div class="px-6 py-4 border-b border-gray-100">
                <h2 class="outfit font-bold text-lg">Recent AI Chats</h2>
            </div>
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Message</th>
                            <th>Reply</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="chats-table-body">
                        <tr><td colspan="4" class="text-center text-gray-400 py-6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="g_id_onload"
     data-client_id="930005975840-u809k2ldaa6cug4jm82tafb5vahoou4h.apps.googleusercontent.com"
     data-callback="handleAdminLogin"
     data-auto_prompt="false">
</div>

<script>
    const WORKER_URL = 'https://po.pocketoregon.workers.dev';
    const ADMIN_EMAIL = 'pocketoregon@gmail.com';

    function handleAdminLogin(response) {
        fetch(WORKER_URL + '/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        })
        .then(r => r.json())
        .then(data => {
            if (data.user && data.user.email === ADMIN_EMAIL) {
                localStorage.setItem('po_user', JSON.stringify(data.user));
                showDashboard(data.user);
            } else {
                document.getElementById('gate-msg').textContent = '⛔ Access denied. This panel is restricted.';
                document.getElementById('gate-login-btn').style.display = 'none';
            }
        })
        .catch(() => {
            document.getElementById('gate-msg').textContent = 'Login failed. Please try again.';
        });
    }

    function showDashboard(user) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('admin-name').textContent = user.name || user.email;
        loadDashboard();
    }

    async function loadDashboard() {
        // Site age
        const origin = new Date('2026-03-13');
        const days = Math.floor((Date.now() - origin) / 86400000);
        document.getElementById('stat-age').textContent = days;

        try {
            const [usersRes, commentsRes, chatsRes] = await Promise.all([
                fetch(WORKER_URL + '/admin/users', { headers: { 'X-Admin-Email': ADMIN_EMAIL } }),
                fetch(WORKER_URL + '/admin/comments', { headers: { 'X-Admin-Email': ADMIN_EMAIL } }),
                fetch(WORKER_URL + '/admin/chats', { headers: { 'X-Admin-Email': ADMIN_EMAIL } })
            ]);

            const users = await usersRes.json();
            const comments = await commentsRes.json();
            const chats = await chatsRes.json();

            // Stats
            document.getElementById('stat-users').textContent = users.length || 0;
            document.getElementById('stat-comments').textContent = comments.length || 0;
            document.getElementById('stat-chats').textContent = chats.length || 0;

            // Users table
            document.getElementById('users-table-body').innerHTML = (users.length ? users : []).map(u => `
                <tr>
                    <td class="font-medium">${esc(u.name || '—')}</td>
                    <td class="text-gray-500">${esc(u.email)}</td>
                    <td><span class="badge badge-${u.role}">${u.role}</span></td>
                    <td class="text-gray-400">${fmt(u.created_at)}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center text-gray-400 py-4">No users yet.</td></tr>';

            // Comments table
            document.getElementById('comments-table-body').innerHTML = (comments.length ? comments : []).map(c => `
                <tr>
                    <td class="font-medium">${esc(c.name || 'User #' + c.user_id)}</td>
                    <td class="text-gray-600 max-w-xs truncate">${esc(c.text)}</td>
                    <td class="text-gray-400">${esc(c.chapter)}</td>
                    <td class="text-gray-400">${fmt(c.created_at)}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center text-gray-400 py-4">No comments yet.</td></tr>';

            // Chats table
            document.getElementById('chats-table-body').innerHTML = (chats.length ? chats : []).map(c => `
                <tr>
                    <td class="text-gray-400">#${c.user_id || '—'}</td>
                    <td class="text-gray-600 max-w-xs truncate">${esc(c.message)}</td>
                    <td class="text-gray-400 max-w-xs truncate">${esc(c.reply)}</td>
                    <td class="text-gray-400">${fmt(c.created_at)}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center text-gray-400 py-4">No chats yet.</td></tr>';

        } catch(e) {
            document.getElementById('users-table-body').innerHTML = '<tr><td colspan="4" class="text-center text-red-400 py-4">Error loading data.</td></tr>';
        }
    }

    function esc(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(ts) {
        if (!ts) return '—';
        return new Date(ts).toLocaleDateString([], { month:'short', day:'numeric', year:'numeric' });
    }

    // On load: check if already logged in
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('po_user');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                if (user.email === ADMIN_EMAIL) {
                    showDashboard(user);
                    return;
                }
            } catch(e) {}
        }
        document.getElementById('gate-msg').textContent = 'Sign in with your admin Google account.';
        document.getElementById('gate-login-btn').style.display = 'block';
        document.getElementById('gate-login-btn').addEventListener('click', () => {
            google.accounts.id.prompt();
        });
    });
</script>
</body>
</html>
